<!doctype html>  
<html lang="vi">  
<head>  
<meta charset="utf-8"/>  
<meta name="viewport" content="width=device-width,initial-scale=1"/>  
<title>Collage Pro</title>  
<style>  
:root{--panel:#fff;--bg:#f3f4f6;--blue:#2563eb;--border:#ddd;--muted:#666;}  
*{box-sizing:border-box;margin:0;padding:0}  
body{font-family:system-ui,sans-serif;background:var(--bg);color:#111;height:100vh;overflow:hidden}  
.app{display:flex;gap:10px;padding:10px;height:100vh}  

.left{width:280px;flex-shrink:0;display:flex;flex-direction:column;gap:7px;overflow-y:auto;padding-right:2px}  
.panel{background:var(--panel);border-radius:10px;padding:10px;box-shadow:0 2px 10px rgba(0,0,0,.07)}  
.sec{font-weight:700;font-size:13px;margin-bottom:6px}  
.help{font-size:11px;color:var(--muted);line-height:1.5;margin-bottom:5px}  
.row{display:flex;gap:5px;align-items:center;flex-wrap:wrap;margin-bottom:4px}  
label{font-size:12px;color:#333;display:flex;align-items:center;gap:4px}  
input[type=range]{width:80px;accent-color:var(--blue)}  
input[type=number]{width:62px;padding:3px 5px;border-radius:6px;border:1px solid var(--border);font-size:12px}  
input[type=color]{width:28px;height:22px;border-radius:4px;border:1px solid var(--border);cursor:pointer;padding:1px}  
input[type=file]{display:none}  
input[type=checkbox]{accent-color:var(--blue);width:13px;height:13px;cursor:pointer}  
input[type=text]{padding:4px 7px;border-radius:6px;border:1px solid var(--border);font-size:12px;width:100%}  
button{font-size:12px;padding:4px 8px;border-radius:7px;cursor:pointer;border:1px solid var(--border);  
  background:#f5f5f5;color:#111;transition:all .15s;white-space:nowrap}  
button:hover{background:#e8eeff;border-color:var(--blue);color:var(--blue)}  
button.primary{background:var(--blue);color:#fff;border-color:var(--blue)}  
button.primary:hover{background:#1d4ed8}  
button.danger{background:#fff5f5;color:#c00;border-color:#fcc}  
button.danger:hover{background:#fee2e2;border-color:#f87171}  
button.success{background:#f0fdf4;color:#166534;border-color:#bbf7d0}  
button.success:hover{background:#dcfce7;border-color:#4ade80}  
button.zact{background:rgba(37,99,235,.12);color:var(--blue);border-color:rgba(37,99,235,.4);font-weight:700}  
button:disabled{opacity:.45;cursor:not-allowed}  
.divider{height:1px;background:#eee;margin:5px 0}  
.val{font-size:11px;color:var(--blue);font-weight:700;min-width:26px}  
.subsec{font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;margin:4px 0 3px}  

.files{display:flex;flex-wrap:wrap;gap:5px;max-height:110px;overflow-y:auto;  
  padding:4px;border:1px dashed #ddd;border-radius:8px;min-height:32px}  
.thumb{width:50px;height:50px;border:1px solid var(--border);border-radius:6px;  
  overflow:hidden;cursor:grab;flex-shrink:0;position:relative}  
.thumb img{width:100%;height:100%;object-fit:cover;display:block;pointer-events:none}  

.tpls{display:grid;grid-template-columns:1fr 1fr;gap:5px}  
.tpl{border:1.5px dashed var(--border);border-radius:8px;cursor:pointer;padding:5px 4px 4px;  
  transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:3px;position:relative}  
.tpl:hover{border-color:var(--blue);background:#f0f5ff}  
.tpl.active{border-color:var(--blue);background:#e8f0fe;outline:2px solid rgba(37,99,235,.25)}  
.tpl.custom{border-style:solid;border-color:#7c3aed}  
.tpl.custom:hover{background:#f5f3ff;border-color:#6d28d9}  
.tpl.custom.active{background:#ede9fe;outline-color:rgba(124,58,237,.25)}  
.tpl-del{position:absolute;top:2px;right:2px;width:14px;height:14px;border-radius:50%;  
  background:rgba(220,38,38,.8);color:#fff;font-size:9px;display:flex;align-items:center;  
  justify-content:center;opacity:0;transition:opacity .15s;border:none;padding:0;cursor:pointer;line-height:1}  
.tpl:hover .tpl-del{opacity:1}  
.tpl-label{font-size:11px;font-weight:700;color:#374151;line-height:1;text-align:center;  
  max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;width:100%;padding:0 2px}  
.tpl-sub{font-size:10px;color:#9ca3af}  

.zoom-bar{display:flex;gap:4px;align-items:center;flex-wrap:wrap}  
.zoom-label{font-size:12px;font-weight:700;min-width:65px;text-align:center;color:var(--blue)}  
.zpresets{display:flex;gap:3px;flex-wrap:wrap;margin-top:4px}  
.zpresets button{padding:2px 6px;font-size:11px}  
.tog-row{display:flex;align-items:center;gap:6px;margin-bottom:3px}  
.tog-row label{font-size:12px;font-weight:500}  
.del-hint{font-size:11px;color:#c00;background:#fff5f5;border:1px solid #fcc;  
  border-radius:6px;padding:3px 8px;display:none;margin-bottom:3px}  
.del-hint.show{display:inline-block}  

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;  
  display:flex;align-items:center;justify-content:center;display:none}  
.modal-overlay.show{display:flex}  
.modal{background:#fff;border-radius:14px;padding:20px;min-width:300px;  
  box-shadow:0 20px 60px rgba(0,0,0,.3)}  
.modal h3{font-size:15px;margin-bottom:12px}  
.modal-row{display:flex;gap:8px;margin-top:10px}  

.right{flex:1;min-width:0;display:flex;flex-direction:column}  
#stage{flex:1;overflow:hidden;position:relative;border-radius:10px;  
  background-color:#c4c8cf;  
  background-image:linear-gradient(45deg,#b8bcc3 25%,transparent 25%),  
    linear-gradient(-45deg,#b8bcc3 25%,transparent 25%),  
    linear-gradient(45deg,transparent 75%,#b8bcc3 75%),  
    linear-gradient(-45deg,transparent 75%,#b8bcc3 75%);  
  background-size:20px 20px;background-position:0 0,0 10px,10px -10px,-10px 0;  
  user-select:none}  
#stage.c-default{cursor:default}  
#stage.c-panready{cursor:grab}  
#stage.c-panning{cursor:grabbing}  
#stage.c-imgpan{cursor:grab}  
#stage.c-imgpanning{cursor:crosshair}  
#viewport{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}  
#host{position:absolute;display:inline-block;line-height:0;transform-origin:top left;pointer-events:all}  
canvas{display:block;border-radius:8px;box-shadow:0 6px 28px rgba(0,0,0,.22)}  
.frames-layer{position:absolute;inset:0;pointer-events:none}  
.gutters-layer{position:absolute;inset:0;pointer-events:none;z-index:10}  
.frame{position:absolute;overflow:hidden;display:flex;align-items:center;justify-content:center;pointer-events:all;border-radius:8px}  
.placeholder{font-size:11px;color:#bbb;text-align:center;padding:8px;pointer-events:none;user-select:none;line-height:1.5}  
.frame img{position:absolute;left:0;top:0;transform-origin:left top;user-select:none;-webkit-user-drag:none;pointer-events:none}  
.gutter{position:absolute;pointer-events:all;z-index:10;background:rgba(100,100,100,.15);border-radius:4px;transition:background .12s}  
.gutter:hover,.gutter.dragging{background:rgba(37,99,235,.55)}  
.gutter.v{cursor:ew-resize}.gutter.h{cursor:ns-resize}  
#toast{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);  
  background:rgba(0,0,0,.5);color:#fff;font-size:11px;padding:4px 14px;border-radius:20px;  
  pointer-events:none;opacity:0;transition:opacity .25s;white-space:nowrap;z-index:100}  
#toast.show{opacity:1}  
</style>  
</head>  
<body>  
<div class="app">  
  <div class="left">  

    <div class="panel">  
      <div class="row" style="justify-content:space-between;margin-bottom:4px">  
        <span class="sec" style="margin:0">Images</span>  
        <button id="uploadBtn">＋ Upload</button>  
        <input id="fileInput" type="file" accept="image/*" multiple>  
      </div>  
      <div class="help">Drag ảnh → frame. <b>Click frame</b> = chọn. <b>Del</b> = xóa ảnh (frame trống: xóa frame). <b>Space+Drag</b> = pan.</div>  
      <div class="files" id="fileList"></div>  
    </div>  

    <div class="panel">  
      <div class="row" style="justify-content:space-between;margin-bottom:6px">  
        <span class="sec" style="margin:0">Templates</span>  
        <div style="display:flex;gap:4px">  
          <button id="saveTplBtn" style="font-size:11px;padding:3px 7px">Save</button>  
          <button id="loadTplBtn" style="font-size:11px;padding:3px 7px">Load</button>  
          <input id="loadTplFile" type="file" accept=".collagetpl,.json">  
        </div>  
      </div>  
      <div class="tpls" id="tplList"></div>  
    </div>  

    <div class="panel">  
      <div class="sec">Layout</div>  
      <div class="row">  
        <label>W <input id="cw" type="number" value="1200"></label>  
        <label>H <input id="ch" type="number" value="800"></label>  
        <button id="applySize">Apply</button>  
      </div>  
      <div class="row">  
        <label>Gap <input id="gap" type="range" min="0" max="80" value="12">  
          <span class="val" id="gapVal">12</span>px</label>  
      </div>  
      <div class="divider"></div>  
      <div class="sec">Zoom &amp; Pan</div>  
      <div class="zoom-bar">  
        <button id="zoomOut">－</button>  
        <span class="zoom-label" id="zoomLabel">Fit</span>  
        <button id="zoomIn">＋</button>  
        <button id="centerBtn" style="font-size:11px;padding:3px 6px">Center</button>  
      </div>  
      <div class="zpresets">  
        <button data-zoom="fit">Fit</button>  
        <button data-zoom="0.25">25%</button>  
        <button data-zoom="0.5">50%</button>  
        <button data-zoom="0.75">75%</button>  
        <button data-zoom="1">100%</button>  
        <button data-zoom="1.5">150%</button>  
      </div>  
    </div>  

    <div class="panel">  
      <div class="sec">Frame Style</div>  

      <div class="subsec">Border</div>  
      <div class="tog-row">  
        <input type="checkbox" id="borderOn" checked>  
        <label for="borderOn">Hiện viền</label>  
      </div>  
      <div id="borderCtrls">  
        <div class="row">  
          <label>Dày <input id="borderW" type="range" min="0" max="30" value="2">  
            <span class="val" id="bWVal">2</span>px</label>  
        </div>  
        <div class="row">  
          <label>Màu <input id="borderColor" type="color" value="#cccccc"></label>  
          <label>Radius <input id="bRadius" type="range" min="0" max="60" value="8">  
            <span class="val" id="bRVal">8</span></label>  
        </div>  
      </div>  

      <div class="divider"></div>  
      <div class="subsec">Shadow</div>  
      <div class="tog-row">  
        <input type="checkbox" id="shadowOn">  
        <label for="shadowOn">Bật bóng đổ</label>  
      </div>  
      <div id="shadowCtrls" style="opacity:.4;pointer-events:none">  
        <div class="row">  
          <label>Blur <input id="shBlur" type="range" min="0" max="80" value="18">  
            <span class="val" id="shBlurV">18</span></label>  
        </div>  
        <div class="row">  
          <label>X <input id="shX" type="range" min="-50" max="50" value="4">  
            <span class="val" id="shXV">4</span></label>  
          <label>Y <input id="shY" type="range" min="-50" max="50" value="6">  
            <span class="val" id="shYV">6</span></label>  
        </div>  
        <div class="row">  
          <label>Màu <input id="shColor" type="color" value="#000000"></label>  
          <label>Alpha <input id="shAlpha" type="range" min="0" max="1" step="0.01" value="0.35">  
            <span class="val" id="shAlphaV">0.35</span></label>  
        </div>  
        <div class="divider"></div>  
        <div class="row">  
          <button id="shAllBtn" class="primary" style="font-size:11px">Áp dụng tất cả</button>  
          <button id="shSelBtn" style="font-size:11px">Frame đang chọn</button>  
        </div>  
        <div class="row">  
          <button id="shClearSel" class="danger" style="font-size:11px">Xóa bóng frame</button>  
        </div>  
      </div>  
    </div>  

    <div class="panel">  
      <div class="sec">Background</div>  
      <div class="row">  
        <label>Color <input id="bgColor" type="color" value="#ffffff"></label>  
        <button id="bgUpBtn">BG Image</button>  
        <input id="bgFile" type="file" accept="image/*">  
        <button id="bgClear">Remove</button>  
      </div>  
    </div>  

    <div class="panel">  
      <div class="sec">Selected Frame</div>  
      <div class="del-hint" id="delHint">⌫ Delete để xóa ảnh (frame trống: xóa frame)</div>  
      <div class="row">  
        <button id="deleteFrameBtn" class="danger" style="font-size:11px">✂ Xóa frame này</button>  
      </div>  
      <div class="row">  
        <button id="splitVBtn">Cắt dọc</button>  
        <button id="splitHBtn">Cắt ngang</button>  
      </div>  
      <div class="divider"></div>  
      <div class="row"><label>Scale  
        <input id="iScale" type="range" min="0.1" max="5" step="0.01" value="1">  
        <span class="val" id="iScaleV">-</span></label></div>  
      <div class="row"><label>Rotate  
        <input id="iRotate" type="range" min="-180" max="180" step="1" value="0">  
        <span class="val" id="iRotateV">-</span>°</label></div>  
      <div class="row"><label>Opacity  
        <input id="iOpacity" type="range" min="0" max="1" step="0.01" value="1">  
        <span class="val" id="iOpacityV">-</span></label></div>  
      <div class="row">  
        <button id="fitCover">Fit Cover</button>  
        <button id="removeImg" class="danger">Remove</button>  
      </div>  
    </div>  

    <div class="panel">  
      <div class="row">  
        <button class="primary" id="exportBtn">Export PNG</button>  
        <button class="success" id="loadProjectBtn">📂 Load Project</button>  
        <input id="loadProjectFile" type="file" accept=".collageproject,.json">  
      </div>  
      <div class="row">  
        <button id="resetTpl">Reset</button>  
        <button id="clearAll">Clear All</button>  
      </div>  
    </div>  

  </div>  

  <div class="right">  
    <div id="stage" class="c-default">  
      <div id="viewport"><div id="host">  
        <canvas id="canvas" width="1200" height="800"></canvas>  
        <div class="frames-layer" id="framesLayer"></div>  
        <div class="gutters-layer" id="guttersLayer"></div>  
      </div></div>  
      <div id="toast"></div>  
    </div>  
  </div>  
</div>  

<div class="modal-overlay" id="saveTplModal">  
  <div class="modal">  
    <h3>Lưu Template</h3>  
    <div style="font-size:12px;color:#666;margin-bottom:8px">Đặt tên cho template:</div>  
    <input type="text" id="saveTplName" placeholder="Ví dụ: Layout của tôi">  
    <div class="modal-row">  
      <button class="primary" id="saveTplConfirm">Lưu &amp; Download</button>  
      <button id="saveTplCancel">Hủy</button>  
    </div>  
  </div>  
</div>  

<script>  
const $=s=>document.querySelector(s);  
const uid=p=>`${p}_${Date.now()}_${Math.random().toString(36).slice(2,6)}`;  

const canvas=$('#canvas'),ctx=canvas.getContext('2d');  
const stage=$('#stage'),host=$('#host'),toast=$('#toast');  

let _tt;  
function showToast(msg,ms=1600){toast.textContent=msg;toast.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>toast.classList.remove('show'),ms);}  

/* ───────────── Zoom / Pan ───────────── */  
const V={zoom:1,panX:0,panY:0,mode:'fit'};  
function applyTransform(){host.style.transform=`scale(${V.zoom})`;host.style.left=V.panX+'px';host.style.top=V.panY+'px';}  
function centerCanvas(){V.panX=(stage.clientWidth-canvas.width*V.zoom)/2;V.panY=(stage.clientHeight-canvas.height*V.zoom)/2;}  
function fitZoom(){return Math.min((stage.clientWidth-40)/canvas.width,(stage.clientHeight-40)/canvas.height,1);}  
function applyZoom(mode,keepCenter=false){  
  V.mode=mode;const nz=mode==='fit'?fitZoom():parseFloat(mode);  
  if(keepCenter){  
    const cx=stage.clientWidth/2,cy=stage.clientHeight/2;  
    const cpx=(cx-V.panX)/V.zoom,cpy=(cy-V.panY)/V.zoom;  
    V.zoom=nz;V.panX=cx-cpx*nz;V.panY=cy-cpy*nz;  
  }else{V.zoom=nz;centerCanvas();}  
  applyTransform();updateZoomUI();  
}  
function updateZoomUI(){  
  const pct=Math.round(V.zoom*100);  
  $('#zoomLabel').textContent=V.mode==='fit'?`Fit (${pct}%)`:pct+'%';  
  document.querySelectorAll('[data-zoom]').forEach(b=>b.classList.toggle('zact',b.dataset.zoom===String(V.mode)));  
}  
const STEPS=[.1,.15,.2,.25,.33,.4,.5,.6,.67,.75,.85,1,1.25,1.5,2,3];  
$('#zoomIn').onclick=()=>{const n=STEPS.find(s=>s>V.zoom+.01)||STEPS.at(-1);applyZoom(n,true);};  
$('#zoomOut').onclick=()=>{const p=[...STEPS].reverse().find(s=>s<V.zoom-.01)||STEPS[0];applyZoom(p,true);};  
document.querySelectorAll('[data-zoom]').forEach(b=>b.onclick=()=>applyZoom(b.dataset.zoom==='fit'?'fit':parseFloat(b.dataset.zoom)));  
$('#centerBtn').onclick=()=>{centerCanvas();applyTransform();};  
stage.addEventListener('wheel',e=>{  
  e.preventDefault();  
  if(e.ctrlKey||e.metaKey){  
    const rc=stage.getBoundingClientRect();  
    const mx=e.clientX-rc.left,my=e.clientY-rc.top;  
    const cpx=(mx-V.panX)/V.zoom,cpy=(my-V.panY)/V.zoom;  
    V.zoom=Math.max(.05,Math.min(10,V.zoom*(e.deltaY<0?1.1:.9)));  
    V.mode=V.zoom;V.panX=mx-cpx*V.zoom;V.panY=my-cpy*V.zoom;  
    applyTransform();updateZoomUI();  
  }else{V.panX-=e.deltaX;V.panY-=e.deltaY;applyTransform();}  
},{passive:false});  
new ResizeObserver(()=>{if(V.mode==='fit')applyZoom('fit');}).observe(stage);  

/* ───────────── Interaction ───────────── */  
let spaceDown=false,layoutPanning=false,imgPanning=false;  
let imgPanFr=null,imgPanEl=null,panLX=0,panLY=0;  
function setCur(c){stage.className='c-'+c;}  

document.addEventListener('keydown',e=>{  
  const t=document.activeElement?.tagName;  
  if(t==='INPUT'||t==='TEXTAREA')return;  
  if(e.code==='Space'&&!spaceDown&&!e.repeat){  
    e.preventDefault();spaceDown=true;  
    if(!layoutPanning&&!imgPanning)setCur('panready');  
  }  
  if((e.key==='Delete'||e.key==='Backspace')&&!e.repeat){  
    const fr=S.frames.find(f=>f.id===S.sel);  
    if(!fr)return;  
    if(fr.assigned) removeSelImg();  
    else if(S.cells.length>1) $('#deleteFrameBtn').onclick();  
  }  
});  
document.addEventListener('keyup',e=>{  
  if(e.code==='Space'){spaceDown=false;if(!layoutPanning)setCur(S.sel?'imgpan':'default');}  
});  
stage.addEventListener('mousedown',e=>{  
  const onBg=e.target===stage||e.target===$('#viewport')||e.target===host||e.target===canvas;  
  if(e.button===1||(e.button===0&&spaceDown)){e.preventDefault();startLP(e.clientX,e.clientY);return;}  
  if(e.button===0&&onBg) selFrame(null);  
});  
function startLP(x,y){layoutPanning=true;panLX=x;panLY=y;setCur('panning');}  
function startIP(x,y,fr,el){imgPanning=true;imgPanFr=fr;imgPanEl=el;panLX=x;panLY=y;setCur('imgpanning');}  
window.addEventListener('mousemove',e=>{  
  if(layoutPanning){  
    V.panX+=e.clientX-panLX;V.panY+=e.clientY-panLY;  
    panLX=e.clientX;panLY=e.clientY;applyTransform();  
  }  
  if(imgPanning&&imgPanFr?.assigned){  
    const a=imgPanFr.assigned;  
    a.offsetX+=(e.clientX-panLX)/V.zoom;  
    a.offsetY+=(e.clientY-panLY)/V.zoom;  
    panLX=e.clientX;panLY=e.clientY;  
    clampA(imgPanFr);  
    if(imgPanEl){const img=imgPanEl.querySelector('img');if(img)setImgStyle(img,a);}  
    renderCanvas();  
  }  
});  
window.addEventListener('mouseup',()=>{  
  if(layoutPanning){layoutPanning=false;setCur(spaceDown?'panready':S.sel?'imgpan':'default');}  
  if(imgPanning){imgPanning=false;imgPanFr=null;imgPanEl=null;setCur(S.sel?'imgpan':'default');}  
});  

/* ───────────── State ───────────── */  
const S={  
  images:[],  
  bg:{color:'#ffffff',img:null,imgSrc:null},  
  gapPx:12,  
  tplId:null,  
  rowW:[], colW:[],  
  vCut:new Map(),  
  hCut:new Map(),  
  cells:[],  
  frames:[],  
  sel:null,  
};  

const GS={borderOn:true,borderW:2,borderColor:'#cccccc',borderRadius:8,shadowOn:false,shBlur:18,shX:4,shY:6,shColor:'#000000',shAlpha:0.35};  

/* ───────────── Templates ───────────── */  
const BUILTIN_TEMPLATES=[  
  {id:'t2x2',name:'2×2',sub:'4 frames',rows:[.5,.5],cols:[.5,.5],  
    prev:{cols:2,rows:2,cells:[{r:0,c:0,rs:1,cs:1},{r:0,c:1,rs:1,cs:1},{r:1,c:0,rs:1,cs:1},{r:1,c:1,rs:1,cs:1}]}},  
  {id:'t2x3',name:'2×3',sub:'6 frames',rows:[.5,.5],cols:[1/3,1/3,1/3],

    prev:{cols:3,rows:3,cells:[  
      {r:0,c:0,rs:1,cs:1},{r:0,c:1,rs:1,cs:1},{r:0,c:2,rs:1,cs:1},

  {id:'t1x3',name:'1×3 V',sub:'3 frames',rows:[1],cols:[1/3,1/3,1/3],

  {id:'heroB',name:'Hero Bottom',sub:'3 frames',rows:[.4,.6],cols:[.5,.5],

];  
let customTemplates=[];  
function getAllTemplates(){return [...BUILTIN_TEMPLATES,...customTemplates];}  

/* ───────────── Template list ───────────── */  
function buildPreview(tpl){  
  const p=tpl.prev; const cols=p.cols,rows=p.rows; const W=56,H=36,g=2;  
  const cW=(W-(cols-1)*g)/cols, rH=(H-(rows-1)*g)/rows;  
  const wrap=document.createElement('div');  
  wrap.style.cssText=`position:relative;width:${W}px;height:${H}px;flex-shrink:0;border-radius:3px;overflow:hidden;background:#e2e8f0`;  
  p.cells.forEach(cell=>{  
    const x=cell.c*(cW+g),y=cell.r*(rH+g);  
    const w=cell.cs*cW+(cell.cs-1)*g, h=cell.rs*rH+(cell.rs-1)*g;  
    const d=document.createElement('div');  
    d.style.cssText=`position:absolute;left:${x}px;top:${y}px;width:${w}px;height:${h}px;background:#94a3b8;border-radius:2px`;  
    wrap.appendChild(d);  
  });  
  return wrap;  
}  
function makeTplCard(t,isCustom){  
  const d=document.createElement('div');  
  d.className='tpl'+(isCustom?' custom':''); d.dataset.id=t.id;  
  d.appendChild(buildPreview(t));  
  const lbl=document.createElement('div');lbl.className='tpl-label';lbl.textContent=t.name;  
  const sub=document.createElement('div');sub.className='tpl-sub';sub.textContent=t.sub;  
  d.appendChild(lbl);d.appendChild(sub);  
  if(isCustom){  
    const del=document.createElement('button');  
    del.className='tpl-del';del.textContent='✕';  
    del.onclick=e=>{  
      e.stopPropagation();  
      if(confirm(`Xóa template "${t.name}"?`)){  
        customTemplates=customTemplates.filter(x=>x.id!==t.id);  
        initTplList();showToast('Đã xóa template');  
      }  
    };  
    d.appendChild(del);  
  }  
  d.onclick=()=>loadTpl(t.id);  
  return d;  
}  
function initTplList(){  
  const list=$('#tplList'); list.innerHTML='';  
  BUILTIN_TEMPLATES.forEach(t=>list.appendChild(makeTplCard(t,false)));  
  customTemplates.forEach(t=>list.appendChild(makeTplCard(t,true)));  
}

$('#saveTplBtn').onclick=()=>{

  $('#saveTplName').value='';

};  
$('#saveTplCancel').onclick=()=>$('#saveTplModal').classList.remove('show');  
$('#saveTplModal').onclick=e=>{if(e.target===$('#saveTplModal'))$('#saveTplModal').classList.remove('show');};  

$('#saveTplConfirm').onclick=()=>{  
  const name=$('#saveTplName').value.trim()||'My Template';  
  const maxR=Math.max(...S.cells.map(c=>c.r+(c.rs||1)));  
  const maxC=Math.max(...S.cells.map(c=>c.c+(c.cs||1)));  
  const tpl={  
    id:uid('ctpl'),name,sub:`${S.cells.length} frames`,isCustom:true,  
    rows:S.rowW.slice(),cols:S.colW.slice(),  
    cells:S.cells.map(c=>({r:c.r,c:c.c,rs:c.rs||1,cs:c.cs||1})),  
    gapPx:S.gapPx,canvasW:canvas.width,canvasH:canvas.height,  
    prev:{cols:maxC,rows:maxR,cells:S.cells.map(c=>({r:c.r,c:c.c,rs:c.rs||1,cs:c.cs||1}))}  
  };  
  const blob=new Blob([JSON.stringify(tpl,null,2)],{type:'application/json'});  
  const a=document.createElement('a');  
  a.href=URL.createObjectURL(blob);  
  a.download=name.replace(/[^a-zA-Z0-9_\-\u00C0-\u024F\u1E00-\u1EFF ]/g,'_')+'.collagetpl';  
  a.click();URL.revokeObjectURL(a.href);  
  customTemplates.push(tpl);initTplList();

$('#loadTplBtn').onclick=()=>$('#loadTplFile').click();  
$('#loadTplFile').onchange=e=>{  
  const file=e.target.files[0];if(!file)return;  
  const r=new FileReader();  
  r.onload=ev=>{  
    try{  
      const tpl=JSON.parse(ev.target.result);  
      if(!tpl.cells||!tpl.rows||!tpl.cols)throw new Error('Invalid');  
      tpl.id=uid('ctpl');tpl.isCustom=true;  
      if(!tpl.prev){  
        const maxR=Math.max(...tpl.cells.map(c=>c.r+(c.rs||1)));  
        const maxC=Math.max(...tpl.cells.map(c=>c.c+(c.cs||1)));  
        tpl.prev={cols:maxC,rows:maxR,cells:tpl.cells.map(c=>({r:c.r,c:c.c,rs:c.rs||1,cs:c.cs||1}))};  
      }  
      tpl.cells=tpl.cells.map(c=>({r:c.r,c:c.c,rs:c.rs||1,cs:c.cs||1}));  
      customTemplates.push(tpl);initTplList();loadTpl(tpl.id);  
      showToast(`Đã load template "${tpl.name}"`);  
    }catch{showToast('File template không hợp lệ');}  
  };  
  r.readAsText(file);  
  e.target.value='';  
};  

function makeCells(R,C){  
  const o=[];for(let r=0;r<R;r++)for(let c=0;c<C;c++)o.push({r,c,rs:1,cs:1});  
  return o;  
}  
function loadTpl(id){  
  const t=getAllTemplates().find(x=>x.id===id); if(!t)return;  
  S.tplId=id;  
  S.rowW=t.rows.slice();  
  S.colW=t.cols.slice();  
  S.cells=t.cells? t.cells.map(c=>({r:c.r,c:c.c,rs:c.rs||1,cs:c.cs||1})) : makeCells(t.rows.length,t.cols.length);  
  S.vCut.clear(); S.hCut.clear();  
  if(t.gapPx!=null){S.gapPx=t.gapPx;$('#gap').value=t.gapPx;$('#gapVal').textContent=t.gapPx;}  
  if(t.canvasW&&t.canvasH){canvas.width=t.canvasW;canvas.height=t.canvasH;$('#cw').value=t.canvasW;$('#ch').value=t.canvasH;}  
  S.sel=null;  
  document.querySelectorAll('.tpl').forEach(x=>x.classList.toggle('active',x.dataset.id===id));  
  rebuild(true); syncCtrl();  
}  

/* ───────────── Geometry ───────────── */  
function edges(w,total){const e=[0];w.forEach((_,i)=>e.push(e[i]+w[i]*total));return e;}  

function cellBoxNoGap(cell){  
  const W=canvas.width,H=canvas.height;  
  const ce=edges(S.colW,W), re=edges(S.rowW,H);  
  const rs=cell.rs||1, cs=cell.cs||1;  
  let x0=ce[cell.c]??0, x1=ce[cell.c+cs]??W;  
  let y0=re[cell.r]??0, y1=re[cell.r+rs]??H;  
  if((cell.rs||1)===1){  
    if((cell.cs||1)===1 && cell.c>0){const d=S.vCut.get(`${cell.r}|${cell.c-1}`)||0;x0+=d;}  
    if((cell.cs||1)===1 && cell.c < S.colW.length-1){const d=S.vCut.get(`${cell.r}|${cell.c}`)||0;x1+=d;}  
  }  
  if((cell.cs||1)===1){  
    if((cell.rs||1)===1 && cell.r>0){const d=S.hCut.get(`${cell.c}|${cell.r-1}`)||0;y0+=d;}  
    if((cell.rs||1)===1 && cell.r < S.rowW.length-1){const d=S.hCut.get(`${cell.c}|${cell.r}`)||0;y1+=d;}  
  }  
  return {x0,y0,x1,y1};  
}  
function computeCellRect(cell){  
  const g=S.gapPx,half=g/2;  
  const b=cellBoxNoGap(cell);  
  return {x:b.x0+half,y:b.y0+half,w:Math.max(10,(b.x1-b.x0)-g),h:Math.max(10,(b.y1-b.y0)-g)};  
}  

function clampA(fr){  
  const a=fr.assigned;if(!a)return;  
  const fw=fr.rect.w,fh=fr.rect.h,dw=a.imgW*a.scale,dh=a.imgH*a.scale;  
  a.offsetX=dw<=fw?(fw-dw)/2:Math.min(0,Math.max(fw-dw,a.offsetX));  
  a.offsetY=dh<=fh?(fh-dh)/2:Math.min(0,Math.max(fh-dh,a.offsetY));  
}  

function rebuild(resetIds=false){  
  const old=S.frames.slice();  
  S.frames=S.cells.map((cell,idx)=>{  
    const rect=computeCellRect(cell);  
    const prev=resetIds?null:(old[idx]||null);  
    const id=resetIds?uid('f'):(prev?.id||uid('f'));  
    return {id,r:cell.r,c:cell.c,rs:(cell.rs||1),cs:(cell.cs||1),rect,assigned:prev?.assigned||null,shadow:(prev&&prev.shadow!==undefined)?prev.shadow:null};  
  });  
  S.frames.forEach(f=>{if(f.assigned)clampA(f);});  
  buildDOM(); renderCanvas();  
}  

/* ───────────── GUTTERS ───────────── */  
function buildGuttersDOM(){  
  const layer=$('#guttersLayer');  
  layer.innerHTML='';  
  if(S.gapPx<1)return;  
  const g=S.gapPx,half=g/2,thick=Math.max(10,g+4);  
  const W=canvas.width,H=canvas.height;  
  function frameAt(px,py){  
    for(const fr of S.frames){const r=fr.rect;if(px>=r.x&&px<=r.x+r.w&&py>=r.y&&py<=r.y+r.h)return fr;}  
    return null;  
  }  
  function mkGutter(type,left,top,w,h,bind){  
    const el=document.createElement('div');  
    el.className='gutter '+type;  
    el.style.left=left+'px';el.style.top=top+'px';el.style.width=w+'px';el.style.height=h+'px';  
    layer.appendChild(el);  
    el.addEventListener('mousedown',e=>{  
      if(spaceDown||e.button!==0)return;  
      e.preventDefault();e.stopPropagation();  
      el.classList.add('dragging');  
      const startX=e.clientX, startY=e.clientY;  
      const snapVCut=new Map(S.vCut);  
      const snapHCut=new Map(S.hCut);  
      const snapColW=S.colW.slice();  
      const snapRowW=S.rowW.slice();  
      const onM=ev=>{  
        const dx=(ev.clientX-startX)/V.zoom;  
        const dy=(ev.clientY-startY)/V.zoom;  
        bind(dx,dy,snapVCut,snapHCut,snapColW,snapRowW);  
        rebuild(false);  
      };  
      const onU=()=>{  
        el.classList.remove('dragging');  
        window.removeEventListener('mousemove',onM);  
        window.removeEventListener('mouseup',onU);  
      };  
      window.addEventListener('mousemove',onM);  
      window.addEventListener('mouseup',onU);  
    });  
    return el;  
  }  
  const ce=edges(S.colW,W);  
  const re=edges(S.rowW,H);  
  for(let c=0;c<S.colW.length-1;c++){  
    const baseX=ce[c+1];  
    for(let r=0;r<S.rowW.length;r++){  
      const y0=re[r],y1=re[r+1];  
      const yMid=(y0+y1)/2;  
      const d=S.vCut.get(`${r}|${c}`)||0;  
      const x=baseX+d;  
      const left=frameAt(x-half-1,yMid);  
      const right=frameAt(x+half+1,yMid);  
      if(!left&&!right)continue;  
      const segTop=y0+half;  
      const segH=(y1-y0)-g;  
      if(segH<8)continue;  
      const fr_r=r, fr_c=c;  
      mkGutter('v',x-thick/2,segTop,thick,segH,  
        (dx,dy,snapVCut,snapHCut,snapColW,snapRowW)=>{  
          const key=`${fr_r}|${fr_c}`;  
          const startD=snapVCut.get(key)||0;  
          let nd=startD+dx;  
          const min=30;  
          const baseXSnap=edges(snapColW,W)[fr_c+1];  
          const boundary=baseXSnap+nd;  
          const baseLeft=edges(snapColW,W)[fr_c];  
          const baseRight=edges(snapColW,W)[fr_c+2]??W;  
          if(left && boundary-baseLeft-g<min) nd=(baseLeft+min+g)-baseXSnap;  
          if(right && baseRight-boundary-g<min) nd=(baseRight-min-g)-baseXSnap;  
          const absX=baseXSnap+nd;  
          if(absX<half) nd=half-baseXSnap;  
          if(absX>W-half) nd=(W-half)-baseXSnap;  
          S.vCut.set(key,nd);  
        }  
      );  
    }  
  }  
  for(let r=0;r<S.rowW.length-1;r++){  
    const baseY=re[r+1];  
    for(let c=0;c<S.colW.length;c++){  
      const x0=ce[c],x1=ce[c+1];  
      const xMid=(x0+x1)/2;  
      const d=S.hCut.get(`${c}|${r}`)||0;  
      const y=baseY+d;  
      const top=frameAt(xMid,y-half-1);  
      const bot=frameAt(xMid,y+half+1);  
      if(!top&&!bot)continue;  
      const segLeft=x0+half;  
      const segW=(x1-x0)-g;  
      if(segW<8)continue;  
      const fr_r=r, fr_c=c;  
      mkGutter('h',segLeft,y-thick/2,segW,thick,  
        (dx,dy,snapVCut,snapHCut,snapColW,snapRowW)=>{  
          const key=`${fr_c}|${fr_r}`;  
          const startD=snapHCut.get(key)||0;  
          let nd=startD+dy;  
          const min=30;  
          const baseYSnap=edges(snapRowW,H)[fr_r+1];  
          const boundary=baseYSnap+nd;  
          const baseTop=edges(snapRowW,H)[fr_r];  
          const baseBot=edges(snapRowW,H)[fr_r+2]??H;  
          if(top && boundary-baseTop-g<min) nd=(baseTop+min+g)-baseYSnap;  
          if(bot && baseBot-boundary-g<min) nd=(baseBot-min-g)-baseYSnap;  
          const absY=baseYSnap+nd;  
          if(absY<half) nd=half-baseYSnap;  
          if(absY>H-half) nd=(H-half)-baseYSnap;  
          S.hCut.set(key,nd);  
        }  
      );  
    }  
  }  
}  

/* ───────────── Frames DOM ───────────── */  
function hexRgba(hex,a){  
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);  
  return `rgba(${r},${g},${b},${a})`;  
}  
function rrPath(c,x,y,w,h,r){  
  c.beginPath();c.moveTo(x+r,y);  
  c.arcTo(x+w,y,x+w,y+h,r);c.arcTo(x+w,y+h,x,y+h,r);  
  c.arcTo(x,y+h,x,y,r);c.arcTo(x,y,x+w,y,r);c.closePath();  
}  
function applyFrameDOMStyle(el,fr){  
  el.style.borderRadius=GS.borderRadius+'px';  
  el.style.border=GS.borderOn&&GS.borderW>0?`${GS.borderW}px solid ${GS.borderColor}`:'none';  
  const sh=fr.shadow;  
  let use=false,sc=GS;  
  if(sh===null){use=GS.shadowOn;sc=GS;}  
  else if(sh===false){use=false;}  
  else{use=true;sc=sh;}  
  el.style.boxShadow=use?`${sc.shX}px ${sc.shY}px ${sc.shBlur}px ${hexRgba(sc.shColor,sc.shAlpha)}`:'none';  
}  
function setElRect(el,r){el.style.left=r.x+'px';el.style.top=r.y+'px';el.style.width=r.w+'px';el.style.height=r.h+'px';}  
function setImgStyle(img,a){  
  img.style.left=a.offsetX+'px';img.style.top=a.offsetY+'px';  
  img.style.width=a.imgW*a.scale+'px';img.style.height=a.imgH*a.scale+'px';  
  img.style.transform=`rotate(${a.rotate}deg)`;  
}  
function buildFrameContent(fr,el){  
  el.innerHTML='';  
  if(!fr.assigned){el.innerHTML='<div class="placeholder">Drop image<br><small>or Upload</small></div>';return;}  
  const a=fr.assigned;  
  const img=document.createElement('img');  
  img.src=a.src;img.style.opacity=a.opacity;setImgStyle(img,a);  
  el.appendChild(img);  
}  
function buildFramesDOM(){  
  const layer=$('#framesLayer'); layer.innerHTML='';  
  S.frames.forEach(fr=>{  
    const el=document.createElement('div');  
    el.className='frame';el.dataset.id=fr.id;  
    setElRect(el,fr.rect);applyFrameDOMStyle(el,fr);  
    el.addEventListener('mousedown',e=>{  
      if(e.button===1||(e.button===0&&spaceDown)){startLP(e.clientX,e.clientY);e.stopPropagation();return;}  
      if(e.button!==0)return;  
      e.stopPropagation();selFrame(fr.id);  
      if(fr.assigned) startIP(e.clientX,e.clientY,fr,el);  
    });  
    el.addEventListener('dragover',e=>{e.preventDefault();el.style.outline='2px dashed #2563eb';});  
    el.addEventListener('dragleave',()=>el.style.outline='');  
    el.addEventListener('drop',async e=>{  
      e.preventDefault();el.style.outline='';  
      const imgId=e.dataTransfer.getData('text/plain');  
      if(imgId){assignImg(imgId,fr.id);return;}  
      const file=e.dataTransfer.files?.[0];  
      if(file?.type.startsWith('image/')){const nid=await addFileAsync(file);assignImg(nid,fr.id);}  
    });  
    el.addEventListener('wheel',e=>{  
      e.preventDefault();e.stopPropagation();  
      if(e.ctrlKey||e.metaKey||spaceDown)return;  
      if(!fr.assigned)return;  
      const a=fr.assigned,d=e.deltaY<0?1.08:.92;  
      const rc=el.getBoundingClientRect();  
      const ix=(e.clientX-rc.left)/V.zoom/a.scale,iy=(e.clientY-rc.top)/V.zoom/a.scale;  
      a.scale*=d;  
      a.offsetX=(e.clientX-rc.left)/V.zoom-ix*a.scale;  
      a.offsetY=(e.clientY-rc.top)/V.zoom-iy*a.scale;  
      clampA(fr);  
      const im=el.querySelector('img');if(im)setImgStyle(im,a);  
      syncCtrl();renderCanvas();  
    },{passive:false});  
    layer.appendChild(el);  
    buildFrameContent(fr,el);  
  });  
  updateSelClass();updateCursor();  
}  
function buildDOM(){buildFramesDOM();buildGuttersDOM();}  
function selFrame(id){S.sel=id;updateSelClass();updateCursor();syncCtrl();renderCanvas();}  
function updateSelClass(){  
  document.querySelectorAll('.frame').forEach(el=>{  
    const sel=el.dataset.id===S.sel;  
    el.style.outline=sel?'3px solid rgba(37,99,235,.75)':'none';  
    el.style.outlineOffset=sel?'-2px':'0';  
  });  
}  
function updateCursor(){if(!layoutPanning&&!imgPanning)setCur(S.sel?'imgpan':'default');}  

/* ───────────── Frame Style Controls ───────────── */  
function readGS(){  
  GS.borderOn=$('#borderOn').checked;  
  GS.borderW=+$('#borderW').value;  
  GS.borderColor=$('#borderColor').value;  
  GS.borderRadius=+$('#bRadius').value;  
  GS.shadowOn=$('#shadowOn').checked;  
  GS.shBlur=+$('#shBlur').value;  
  GS.shX=+$('#shX').value;  
  GS.shY=+$('#shY').value;  
  GS.shColor=$('#shColor').value;  
  GS.shAlpha=+$('#shAlpha').value;  
}  
function refreshFrameStyles(){  
  document.querySelectorAll('.frame').forEach(el=>{  
    const fr=S.frames.find(f=>f.id===el.dataset.id);  
    if(fr)applyFrameDOMStyle(el,fr);  
  });  
}  
function onStyleChange(){readGS();refreshFrameStyles();renderCanvas();}  

$('#borderOn').onchange=()=>{  
  const on=$('#borderOn').checked;  
  $('#borderCtrls').style.opacity=on?'1':'.4';  
  $('#borderCtrls').style.pointerEvents=on?'all':'none';  
  onStyleChange();  
};  
[['#borderW','#bWVal'],['#bRadius','#bRVal']].forEach(([id,vId])=>{  
  $(id).oninput=()=>{$(vId).textContent=$(id).value;onStyleChange();};  
});  
$('#borderColor').oninput=onStyleChange;  

$('#shadowOn').onchange=()=>{  
  const on=$('#shadowOn').checked;  
  $('#shadowCtrls').style.opacity=on?'1':'.4';  
  $('#shadowCtrls').style.pointerEvents=on?'all':'none';  
  onStyleChange();  
};  
[['#shBlur','#shBlurV'],['#shX','#shXV'],['#shY','#shYV'],['#shAlpha','#shAlphaV']].forEach(([id,vId])=>{  
  $(id).oninput=()=>{  
    $(vId).textContent=parseFloat($(id).value).toFixed(id==='#shAlpha'?2:0);  
    onStyleChange();  
  };  
});  
$('#shColor').oninput=onStyleChange;  

function makeShObj(){return{shBlur:GS.shBlur,shX:GS.shX,shY:GS.shY,shColor:GS.shColor,shAlpha:GS.shAlpha};}  
$('#shAllBtn').onclick=()=>{readGS();S.frames.forEach(fr=>{fr.shadow=null;});refreshFrameStyles();renderCanvas();showToast('Áp dụng bóng global');};  
$('#shSelBtn').onclick=()=>{  
  const fr=S.frames.find(f=>f.id===S.sel);  
  if(!fr){showToast('Chưa chọn frame');return;}  
  readGS();fr.shadow=GS.shadowOn?makeShObj():false;  
  refreshFrameStyles();renderCanvas();showToast('Bóng cho frame đang chọn');  
};  
$('#shClearSel').onclick=()=>{  
  const fr=S.frames.find(f=>f.id===S.sel);  
  if(!fr){showToast('Chưa chọn frame');return;}  
  fr.shadow=false;refreshFrameStyles();renderCanvas();showToast('Đã xóa bóng frame');  
};  

/* ───────────── Images ───────────── */  
$('#uploadBtn').onclick=()=>$('#fileInput').click();  
$('#fileInput').onchange=e=>{[...e.target.files].forEach(addFile);$('#fileInput').value='';};  
$('#fileList').addEventListener('dragover',e=>e.preventDefault());  
$('#fileList').addEventListener('drop',e=>{  
  e.preventDefault();  
  [...(e.dataTransfer.files||[])].filter(f=>f.type.startsWith('image/')).forEach(addFile);
});
function addThumb(id,src){
  const d=document.createElement('div');
  d.className='thumb';d.draggable=true;d.dataset.id=id;
  d.innerHTML=`<img src="${src}">`;
  $('#fileList').appendChild(d);
  d.addEventListener('dragstart',e=>e.dataTransfer.setData('text/plain',id));
}
function addFile(file){
  if(!file?.type?.startsWith('image/'))return;
  const r=new FileReader();
  r.onload=ev=>{
    const img=new Image();
    img.onload=()=>{const id=uid('img');S.images.push({id,src:ev.target.result,img});addThumb(id,ev.target.result);};
    img.src=ev.target.result;
  };
  r.readAsDataURL(file);
}
function addFileAsync(file){
  return new Promise(res=>{
    const r=new FileReader();
    r.onload=ev=>{
      const img=new Image();
      img.onload=()=>{const id=uid('img');S.images.push({id,src:ev.target.result,img});addThumb(id,ev.target.result);res(id);};
      img.src=ev.target.result;
    };
    r.readAsDataURL(file);
  });
}
function mkAssigned(ir,fr){
  const fw=fr.rect.w,fh=fr.rect.h,iw=ir.img.width,ih=ir.img.height;
  const scale=Math.max(fw/iw,fh/ih);
  return{imgId:ir.id,src:ir.src,imgW:iw,imgH:ih,scale,rotate:0,opacity:1,offsetX:(fw-iw*scale)/2,offsetY:(fh-ih*scale)/2};
}
function assignImg(imgId,frameId){
  const ir=S.images.find(i=>i.id===imgId),fr=S.frames.find(f=>f.id===frameId);
  if(!ir||!fr)return;
  fr.assigned=mkAssigned(ir,fr);
  selFrame(fr.id);
  rebuild(false);
  syncCtrl();
}
function removeSelImg(){
  const fr=S.frames.find(f=>f.id===S.sel);
  if(!fr?.assigned)return;
  fr.assigned=null;
  rebuild(false);
  syncCtrl();
}

/* ───────────── Delete frame ───────────── */
$('#deleteFrameBtn').onclick=()=>{
  if(!S.sel){showToast('Chưa chọn frame');return;}
  if(S.cells.length<=1){showToast('Phải còn ít nhất 1 frame');return;}
  const fr=S.frames.find(f=>f.id===S.sel);
  if(!fr){showToast('Không tìm thấy frame');return;}
  const idx=S.cells.findIndex(c=>c.r===fr.r&&c.c===fr.c&&(c.rs||1)===(fr.rs||1)&&(c.cs||1)===(fr.cs||1));
  if(idx<0){showToast('Không tìm thấy cell');return;}
  S.cells.splice(idx,1);
  S.sel=null;
  rebuild(true);syncCtrl();
  showToast('Đã xóa frame');
};

/* ───────────── Split ───────────── */
function normalizeWeights(arr){const s=arr.reduce((a,b)=>a+b,0)||1;for(let i=0;i<arr.length;i++)arr[i]/=s;}
function findSelCellIndex(){
  if(!S.sel) return -1;
  const fr=S.frames.find(f=>f.id===S.sel); if(!fr) return -1;
  return S.cells.findIndex(c=>c.r===fr.r&&c.c===fr.c&&(c.rs||1)===(fr.rs||1)&&(c.cs||1)===(fr.cs||1));
}
function snapshotAssignedByCell(){
  const m=new Map();
  S.frames.forEach(f=>m.set(`${f.r}|${f.c}|${f.rs}|${f.cs}`,{assigned:f.assigned,shadow:f.shadow}));
  return m;
}
function restoreAssignedByCell(m){
  S.frames.forEach(f=>{
    const s=m.get(`${f.r}|${f.c}|${f.rs}|${f.cs}`);
    if(s){f.assigned=s.assigned;f.shadow=s.shadow;}
  });
}

function splitVertical(){
  const idx=findSelCellIndex();
  if(idx<0){showToast('Chưa chọn frame');return;}
  const sel=S.cells[idx];
  const r=sel.r,c=sel.c,rs=sel.rs||1,cs=sel.cs||1;
  if(rs!==1||cs!==1){showToast('Hiện chỉ hỗ trợ cắt frame 1×1');return;}
  const saved=snapshotAssignedByCell();
  const W=canvas.width;
  const ce=edges(S.colW,W);
  const oldMid=ce[c+1];
  const oldColW=S.colW[c];
  S.colW.splice(c,1,oldColW/2,oldColW/2); normalizeWeights(S.colW);
  S.cells=S.cells.map(cell=>{const n={...cell,rs:cell.rs||1,cs:cell.cs||1}; if(n.c>=c+1) n.c+=1; return n;});
  S.cells.splice(idx,1,{r,c,rs:1,cs:1},{r,c:c+1,rs:1,cs:1});
  const ce2=edges(S.colW,W);
  const newMid=ce2[c+1];
  for(let rr=0; rr<S.rowW.length; rr++){
    if(rr===r) continue;
    const key=`${rr}|${c}`;
    S.vCut.set(key,(S.vCut.get(key)||0) + (oldMid - newMid));
  }
  S.sel=null;
  rebuild(true);
  restoreAssignedByCell(saved);
  syncCtrl();
  showToast('Đã cắt dọc');
}

function splitHorizontal(){
  const idx=findSelCellIndex();
  if(idx<0){showToast('Chưa chọn frame');return;}
  const sel=S.cells[idx];
  const r=sel.r,c=sel.c,rs=sel.rs||1,cs=sel.cs||1;
  if(rs!==1||cs!==1){showToast('Hiện chỉ hỗ trợ cắt frame 1×1');return;}
  const saved=snapshotAssignedByCell();
  const H=canvas.height;
  const re=edges(S.rowW,H);
  const oldMid=re[r+1];
  const oldRowH=S.rowW[r];
  S.rowW.splice(r,1,oldRowH/2,oldRowH/2); normalizeWeights(S.rowW);
  S.cells=S.cells.map(cell=>{const n={...cell,rs:cell.rs||1,cs:cell.cs||1}; if(n.r>=r+1) n.r+=1; return n;});
  S.cells.splice(idx,1,{r,c,rs:1,cs:1},{r:r+1,c,rs:1,cs:1});
  const re2=edges(S.rowW,H);
  const newMid=re2[r+1];
  for(let cc=0; cc<S.colW.length; cc++){
    if(cc===c) continue;
    const key=`${cc}|${r}`;
    S.hCut.set(key,(S.hCut.get(key)||0) + (oldMid - newMid));
  }
  S.sel=null;
  rebuild(true);
  restoreAssignedByCell(saved);
  syncCtrl();
  showToast('Đã cắt ngang');
}

$('#splitVBtn').onclick=splitVertical;
$('#splitHBtn').onclick=splitHorizontal;

/* ───────────── Background ───────────── */
$('#bgColor').oninput=()=>{S.bg.color=$('#bgColor').value;renderCanvas();};
$('#bgUpBtn').onclick=()=>$('#bgFile').click();
$('#bgFile').onchange=e=>{const f=e.target.files[0];if(f)setBGFile(f);$('#bgFile').value='';};
$('#bgClear').onclick=()=>{S.bg.img=null;S.bg.imgSrc=null;renderCanvas();};
function setBGFile(file){
  const r=new FileReader();
  r.onload=ev=>{
    const img=new Image();
    img.onload=()=>{S.bg.img=img;S.bg.imgSrc=ev.target.result;renderCanvas();};
    img.src=ev.target.result;
  };
  r.readAsDataURL(file);
}

/* ───────────── Selected controls ───────────── */
function syncCtrl(){
  const fr=S.frames.find(f=>f.id===S.sel),has=!!(fr?.assigned);
  [$('#iScale'),$('#iRotate'),$('#iOpacity'),$('#fitCover'),$('#removeImg')].forEach(el=>el.disabled=!has);
  $('#deleteFrameBtn').disabled=!S.sel;
  $('#splitVBtn').disabled=!S.sel;
  $('#splitHBtn').disabled=!S.sel;
  $('#delHint').classList.toggle('show',!!(fr&&fr.assigned));
  if(!has){$('#iScaleV').textContent=$('#iRotateV').textContent=$('#iOpacityV').textContent='-';return;}
  const a=fr.assigned;
  $('#iScale').value=a.scale.toFixed(2);$('#iScaleV').textContent=a.scale.toFixed(2);
  $('#iRotate').value=a.rotate.toFixed(0);$('#iRotateV').textContent=a.rotate.toFixed(0);
  $('#iOpacity').value=a.opacity.toFixed(2);$('#iOpacityV').textContent=a.opacity.toFixed(2);
}
const getSelFr=()=>S.frames.find(f=>f.id===S.sel)||null;
function liveImgUpdate(fn){
  const fr=getSelFr();if(!fr?.assigned)return;
  fn(fr);clampA(fr);
  const img=document.querySelector(`.frame[data-id="${fr.id}"] img`);
  if(img){setImgStyle(img,fr.assigned);img.style.opacity=fr.assigned.opacity;}
  renderCanvas();
}
$('#iScale').oninput=()=>liveImgUpdate(fr=>{fr.assigned.scale=+$('#iScale').value;$('#iScaleV').textContent=(+$('#iScale').value).toFixed(2);});
$('#iRotate').oninput=()=>liveImgUpdate(fr=>{fr.assigned.rotate=+$('#iRotate').value;$('#iRotateV').textContent=$('#iRotate').value;});
$('#iOpacity').oninput=()=>liveImgUpdate(fr=>{fr.assigned.opacity=+$('#iOpacity').value;$('#iOpacityV').textContent=(+$('#iOpacity').value).toFixed(2);});
$('#fitCover').onclick=()=>{
  const fr=getSelFr();if(!fr?.assigned)return;
  const ir=S.images.find(i=>i.id===fr.assigned.imgId);if(!ir)return;
  const{rotate,opacity}=fr.assigned;
  fr.assigned=mkAssigned(ir,fr);fr.assigned.rotate=rotate;fr.assigned.opacity=opacity;
  rebuild(false);syncCtrl();
};
$('#removeImg').onclick=()=>removeSelImg();

$('#gap').oninput=()=>{S.gapPx=+$('#gap').value||0;$('#gapVal').textContent=$('#gap').value;rebuild(false);};
$('#applySize').onclick=()=>{
  canvas.width=+$('#cw').value||1200;
  canvas.height=+$('#ch').value||800;
  rebuild(false);
  applyZoom(V.mode==='fit'?'fit':V.mode,false);
};

/* ───────────── Render ───────────── */
function drawFrameToCtx(oc,fr,forExport=false){
  const{x,y,w,h}=fr.rect,rad=GS.borderRadius;
  const sh=fr.shadow;
  let use=false,sc=GS;
  if(sh===null){use=GS.shadowOn;sc=GS;}
  else if(sh===false){use=false;}
  else{use=true;sc=sh;}
  if(use){
    const pad=Math.abs(sc.shBlur)*3+Math.max(Math.abs(sc.shX),Math.abs(sc.shY))+20;
    const tmp=document.createElement('canvas');
    tmp.width=Math.ceil(w+pad*2);tmp.height=Math.ceil(h+pad*2);
    const tc=tmp.getContext('2d');
    tc.shadowBlur=sc.shBlur;tc.shadowOffsetX=sc.shX;tc.shadowOffsetY=sc.shY;
    tc.shadowColor=hexRgba(sc.shColor,sc.shAlpha);
    tc.fillStyle='#fff';
    rrPath(tc,pad,pad,w,h,rad);tc.fill();
    oc.drawImage(tmp,x-pad,y-pad);
  }
  oc.save();
  rrPath(oc,x,y,w,h,rad);oc.clip();
  if(!fr.assigned){
    oc.fillStyle='rgba(228,232,242,.95)';oc.fillRect(x,y,w,h);
  }else{
    const a=fr.assigned,img=S.images.find(i=>i.id===a.imgId)?.img;
    if(img){
      oc.globalAlpha=a.opacity;
      const dw=a.imgW*a.scale,dh=a.imgH*a.scale;
      const cx=x+a.offsetX+dw/2,cy=y+a.offsetY+dh/2;
      oc.translate(cx,cy);oc.rotate(a.rotate*Math.PI/180);oc.translate(-cx,-cy);
      oc.drawImage(img,x+a.offsetX,y+a.offsetY,dw,dh);
      oc.globalAlpha=1;
    }
  }
  oc.restore();
  if(GS.borderOn&&GS.borderW>0){
    oc.save(); rrPath(oc,x,y,w,h,rad);
    oc.strokeStyle=GS.borderColor;oc.lineWidth=GS.borderW;oc.stroke();
    oc.restore();
  }
  if(!forExport&&fr.id===S.sel){
    oc.save(); rrPath(oc,x-2,y-2,w+4,h+4,rad+2);
    oc.strokeStyle='rgba(37,99,235,.8)';oc.lineWidth=2.5;oc.stroke();
    oc.restore();
  }
}
function renderCanvas(){
  const W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle=S.bg.color||'#fff'; ctx.fillRect(0,0,W,H);
  if(S.bg.img){
    const im=S.bg.img,s=Math.max(W/im.width,H/im.height);
    ctx.drawImage(im,(W-im.width*s)/2,(H-im.height*s)/2,im.width*s,im.height*s);
  }
  S.frames.forEach(fr=>drawFrameToCtx(ctx,fr,false));
}

/* ───────────── Export PNG + Project ───────────── */
function buildExportCanvas(){
  const out=document.createElement('canvas');
  out.width=canvas.width;out.height=canvas.height;
  const oc=out.getContext('2d');
  oc.fillStyle=S.bg.color||'#fff';
  oc.fillRect(0,0,out.width,out.height);
  if(S.bg.img){
    const im=S.bg.img,s=Math.max(out.width/im.width,out.height/im.height);
    oc.drawImage(im,(out.width-im.width*s)/2,(out.height-im.height*s)/2,im.width*s,im.height*s);
  }
  S.frames.forEach(fr=>drawFrameToCtx(oc,fr,true));
  return out;
}

function serializeProject(){
  /* Chuyển toàn bộ state sang JSON-serializable object.
     Ảnh được lưu dưới dạng base64 data URL để file self-contained. */
  return {
    version: 2,
    canvasW: canvas.width,
    canvasH: canvas.height,
    gapPx: S.gapPx,
    tplId: S.tplId,
    rowW: S.rowW.slice(),
    colW: S.colW.slice(),
    vCut: [...S.vCut.entries()],
    hCut: [...S.hCut.entries()],
    cells: S.cells.map(c=>({r:c.r,c:c.c,rs:c.rs||1,cs:c.cs||1})),
    bg: {color: S.bg.color, imgSrc: S.bg.imgSrc||null},
    gs: {...GS},
    images: S.images.map(im=>({id:im.id, src:im.src})),
    frames: S.frames.map(fr=>({
      id: fr.id,
      r: fr.r, c: fr.c, rs: fr.rs, cs: fr.cs,
      shadow: fr.shadow,
      assigned: fr.assigned ? {
        imgId:   fr.assigned.imgId,
        src:     fr.assigned.src,
        imgW:    fr.assigned.imgW,
        imgH:    fr.assigned.imgH,
        scale:   fr.assigned.scale,
        rotate:  fr.assigned.rotate,
        opacity: fr.assigned.opacity,
        offsetX: fr.assigned.offsetX,
        offsetY: fr.assigned.offsetY,
      } : null,
    })),
    customTemplates: customTemplates.map(t=>({...t})),
  };
}

async function deserializeProject(data){
  if(!data||!data.version){throw new Error('Invalid project file');}

  /* 1. Canvas size */
  canvas.width  = data.canvasW || 1200;
  canvas.height = data.canvasH || 800;
  $('#cw').value = canvas.width;
  $('#ch').value = canvas.height;

  /* 2. Gap */
  S.gapPx = data.gapPx ?? 12;
  $('#gap').value = S.gapPx;
  $('#gapVal').textContent = S.gapPx;

  /* 3. Layout */
  S.tplId = data.tplId || null;
  S.rowW  = data.rowW.slice();
  S.colW  = data.colW.slice();
  S.vCut  = new Map(data.vCut||[]);
  S.hCut  = new Map(data.hCut||[]);
  S.cells = data.cells.map(c=>({r:c.r,c:c.c,rs:c.rs||1,cs:c.cs||1}));
  S.sel   = null;

  /* 4. Global style */
  if(data.gs){
    Object.assign(GS, data.gs);
    applyGStoUI();
  }

  /* 5. Background */
  S.bg.color  = data.bg?.color || '#ffffff';
  S.bg.imgSrc = data.bg?.imgSrc || null;
  S.bg.img    = null;
  $('#bgColor').value = S.bg.color;
  if(S.bg.imgSrc){
    await new Promise(res=>{
      const im=new Image();
      im.onload=()=>{S.bg.img=im;res();};
      im.onerror=res;
      im.src=S.bg.imgSrc;
    });
  }

  /* 6. Images – load tất cả song song */
  S.images=[];
  $('#fileList').innerHTML='';
  await Promise.all((data.images||[]).map(im=>new Promise(res=>{
    const imgEl=new Image();
    imgEl.onload=()=>{
      S.images.push({id:im.id, src:im.src, img:imgEl});
      addThumb(im.id, im.src);
      res();
    };
    imgEl.onerror=res;
    imgEl.src=im.src;
  })));

  /* 7. Frames – khôi phục assigned (tham chiếu lại image object) */
  S.frames = data.frames.map(fd=>{
    const cell = S.cells.find(c=>c.r===fd.r&&c.c===fd.c&&(c.rs||1)===fd.rs&&(c.cs||1)===fd.cs);
    const rect = cell ? computeCellRect(cell) : {x:0,y:0,w:100,h:100};
    let assigned = null;
    if(fd.assigned){
      /* Ưu tiên dùng img object đã load ở bước 6 */
      const found = S.images.find(i=>i.id===fd.assigned.imgId);
      assigned = {
        imgId:   fd.assigned.imgId,
        src:     fd.assigned.src || (found?.src),
        imgW:    fd.assigned.imgW,
        imgH:    fd.assigned.imgH,
        scale:   fd.assigned.scale,
        rotate:  fd.assigned.rotate,
        opacity: fd.assigned.opacity,
        offsetX: fd.assigned.offsetX,
        offsetY: fd.assigned.offsetY,
      };
      /* Nếu image chưa có trong S.images (project lưu src riêng trong assigned) */
      if(!found && assigned.src){
        const imgEl=new Image();
        imgEl.src=assigned.src;
        S.images.push({id:assigned.imgId, src:assigned.src, img:imgEl});
        addThumb(assigned.imgId, assigned.src);
      }
    }
    return {
      id: fd.id,
      r: fd.r, c: fd.c, rs: fd.rs||1, cs: fd.cs||1,
      rect,
      assigned,
      shadow: fd.shadow !== undefined ? fd.shadow : null,
    };
  });

  /* 8. Custom templates */
  if(data.customTemplates?.length){
    customTemplates = data.customTemplates.map(t=>({...t}));
    initTplList();
  }

  /* 9. Rebuild DOM + render */
  buildDOM();
  renderCanvas();
  applyZoom('fit');
  syncCtrl();

  /* highlight active template */
  document.querySelectorAll('.tpl').forEach(x=>x.classList.toggle('active',x.dataset.id===S.tplId));
}

/* Áp dụng GS object lên UI controls */
function applyGStoUI(){
  $('#borderOn').checked    = GS.borderOn;
  $('#borderW').value       = GS.borderW;
  $('#bWVal').textContent   = GS.borderW;
  $('#borderColor').value   = GS.borderColor;
  $('#bRadius').value       = GS.borderRadius;
  $('#bRVal').textContent   = GS.borderRadius;
  $('#shadowOn').checked    = GS.shadowOn;
  $('#shBlur').value        = GS.shBlur;
  $('#shBlurV').textContent = GS.shBlur;
  $('#shX').value           = GS.shX;
  $('#shXV').textContent    = GS.shX;
  $('#shY').value           = GS.shY;
  $('#shYV').textContent    = GS.shY;
  $('#shColor').value       = GS.shColor;
  $('#shAlpha').value       = GS.shAlpha;
  $('#shAlphaV').textContent= GS.shAlpha.toFixed(2);
  $('#borderCtrls').style.opacity = GS.borderOn?'1':'.4';
  $('#borderCtrls').style.pointerEvents = GS.borderOn?'all':'none';
  $('#shadowCtrls').style.opacity = GS.shadowOn?'1':'.4';
  $('#shadowCtrls').style.pointerEvents = GS.shadowOn?'all':'none';
}

/* Export PNG và đồng thời lưu project */
$('#exportBtn').onclick=async ()=>{
  /* 1. Export PNG */
  const out = buildExportCanvas();
  const pngA = document.createElement('a');
  pngA.download = 'collage.png';
  pngA.href = out.toDataURL('image/png');
  pngA.click();

  /* 2. Lưu project file .collageproject */
  await new Promise(r=>setTimeout(r,200)); // nhường thread để PNG kịp trigger
  const proj = serializeProject();
  const blob = new Blob([JSON.stringify(proj)],{type:'application/json'});
  const projA = document.createElement('a');
  projA.download = 'collage.collageproject';
  projA.href = URL.createObjectURL(blob);
  projA.click();
  URL.revokeObjectURL(projA.href);

  showToast('Đã export PNG + lưu project!', 2200);
};

/* Load project */
$('#loadProjectBtn').onclick=()=>$('#loadProjectFile').click();
$('#loadProjectFile').onchange=e=>{
  const file=e.target.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=async ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      await deserializeProject(data);
      showToast('Đã load project thành công!', 2000);
    }catch(err){
      console.error(err);
      showToast('File project không hợp lệ');
    }
  };
  reader.readAsText(file);
  e.target.value='';
};

/* ───────────── Reset / Clear ───────────── */
$('#resetTpl').onclick=()=>{
  if(!S.tplId){showToast('Chưa chọn template');return;}
  S.frames.forEach(f=>f.assigned=null);
  const t=getAllTemplates().find(x=>x.id===S.tplId);
  if(t){
    S.rowW=t.rows.slice();S.colW=t.cols.slice();
    S.cells=t.cells? t.cells.map(c=>({r:c.r,c:c.c,rs:c.rs||1,cs:c.cs||1})) : makeCells(t.rows.length,t.cols.length);
  }
  S.vCut.clear(); S.hCut.clear();
  S.sel=null;rebuild(true);syncCtrl();showToast('Đã reset layout');
};
$('#clearAll').onclick=()=>{
  S.frames.forEach(f=>f.assigned=null);
  S.images=[];S.sel=null;
  $('#fileList').innerHTML='';
  S.vCut.clear(); S.hCut.clear();
  rebuild(false);syncCtrl();
  showToast('Đã xóa tất cả');
};

/* ───────────── Init ───────────── */
initTplList();
loadTpl('t3x3');

$('#gapVal').textContent=$('#gap').value;
$('#bWVal').textContent=$('#borderW').value;
$('#bRVal').textContent=$('#bRadius').value;
$('#shBlurV').textContent=$('#shBlur').value;
$('#shXV').textContent=$('#shX').value;
$('#shYV').textContent=$('#shY').value;
$('#shAlphaV').textContent=parseFloat($('#shAlpha').value).toFixed(2);

readGS();
$('#borderCtrls').style.opacity=$('#borderOn').checked?'1':'.4';
$('#borderCtrls').style.pointerEvents=$('#borderOn').checked?'all':'none';
$('#shadowCtrls').style.opacity=$('#shadowOn').checked?'1':'.4';
$('#shadowCtrls').style.pointerEvents=$('#shadowOn').checked?'all':'none';

applyZoom('fit');
syncCtrl();
</script>
